name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Dependencias
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev build-essential ccache
    - uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ hashFiles('buildozer.spec') }}
    - name: Instalar buildozer
      run: pip install buildozer==1.5.0 cython==0.29.36
    - name: Build APK
      run: buildozer -v android debug 2>&1 | tail -200
    - uses: actions/upload-artifact@v4
      with:
        name: ermos-apk
        path: bin/*.apk
        retention-days: 30
